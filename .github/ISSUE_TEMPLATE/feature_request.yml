name: 功能建议
description: 提议新的使用场景或改进
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        请先描述问题和使用场景，再描述方案。涉及数据同步、账号、凭证或数据库时，请说明兼容和安全边界。
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue 和文档
          required: true
        - label: 这个建议不依赖提交真实私人数据
          required: true
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 谁在什么情况下遇到了什么困难？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
  - type: textarea
    id: impact
    attributes:
      label: 数据、兼容性与安全影响
      description: 是否涉及数据库迁移、多端同步、账号隔离、API Key 或破坏性操作？
