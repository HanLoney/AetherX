<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我们的纪念册 · AetherX</title>
    <link rel="stylesheet" href="app-shell.css" />
    <link rel="stylesheet" href="album.css" />
  </head>
  <body>
    <div class="ambient ambient-a"></div>
    <div class="ambient ambient-b"></div>

    <header class="titlebar">
      <div class="drag-title">AetherX · 我们的纪念册</div>
      <div class="window-actions">
        <button id="minimizeBtn" class="window-btn" aria-label="最小化">—</button>
        <button id="maximizeBtn" class="window-btn" aria-label="最大化">□</button>
        <button id="closeBtn" class="window-btn close" aria-label="关闭">×</button>
      </div>
    </header>

    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">玄</div>
          <div><strong>AetherX</strong><span>你的智能生活中枢</span></div>
        </div>
        <nav class="nav-list">
          <button id="homeBtn" class="nav-item"><i>✦</i>聊天</button>
          <button id="todoBtn" class="nav-item"><i>✓</i>日历待办</button>
          <button id="memoryBtn" class="nav-item"><i>◈</i>记忆中心</button>
          <button class="nav-item active"><i>◇</i>我们的纪念册</button>
          <button id="modulesBtn" class="nav-item"><i>◫</i>模块中心</button>
        </nav>
        <div class="privacy-note">
          <i>◇</i>
          <span>纪念卡由小玄基于真实来源书写，来源可展开查看。</span>
        </div>
      </aside>

      <main class="album-main">
        <section class="album-topbar">
          <div class="album-heading">
            <p>OUR ALBUM</p>
            <h1>我们的纪念册</h1>
            <span>把我们共同走过的片刻，装订成一本可以慢慢翻阅的书。</span>
          </div>
          <div class="album-actions">
            <label class="album-search">
              <span aria-hidden="true">⌕</span>
              <input id="albumSearch" aria-label="搜索纪念册" placeholder="寻找某个时刻" />
            </label>
            <button id="refreshAlbumBtn" type="button" aria-label="刷新纪念册">重新翻开</button>
          </div>
        </section>

        <section class="album-board">
          <header class="album-index">
            <div class="album-index-title">
              <span>MEMORY ARCHIVE</span>
              <strong>只属于我们的时刻</strong>
            </div>
            <div class="album-stats">
              <div><strong id="momentCount">0</strong><span>个纪念</span></div>
              <div><strong id="sourceCount">0</strong><span>份真实来源</span></div>
              <div><strong id="latestMoment">还没有</strong><span>最近收录</span></div>
            </div>
            <div class="album-authenticity"><i></i>每一页都有来处</div>
          </header>

          <div class="album-reader">
            <button id="albumPrevious" class="album-turn album-turn-previous" type="button" aria-label="上一页">
              <span aria-hidden="true">‹</span><small>上一页</small>
            </button>
            <div class="album-book">
              <div class="album-cover-detail album-cover-detail-top" aria-hidden="true"></div>
              <div class="album-cover-detail album-cover-detail-bottom" aria-hidden="true"></div>
              <div id="albumTimeline" class="album-timeline" aria-live="polite"></div>
              <footer class="album-reader-footer">
                <span id="albumPageLabel">0 / 0</span>
                <i aria-hidden="true"></i>
                <small>OUR STORY, PAGE BY PAGE</small>
              </footer>
            </div>
            <button id="albumNext" class="album-turn album-turn-next" type="button" aria-label="下一页">
              <span aria-hidden="true">›</span><small>下一页</small>
            </button>
          </div>
        </section>
      </main>
    </div>

    <div id="notice" class="notice hidden"></div>

    <script src="api-client.js"></script>
    <script src="module-settings.js"></script>
    <script src="album-pager.js"></script>
    <script src="album.js"></script>
  </body>
</html>
