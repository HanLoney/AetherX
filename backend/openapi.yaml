openapi: 3.1.0
info:
  title: AetherX API
  version: 1.0.0
  description: AetherX Hub 的 REST API 与 SSE 同步契约。除明确标记为公开的接口外，所有请求都需要 Bearer 认证。
  license:
    name: MIT
    identifier: MIT
  contact:
    name: AetherX Project
    url: https://github.com/HanLoney/AetherX
externalDocs:
  description: AetherX 文档中心
  url: https://github.com/HanLoney/AetherX/blob/main/docs/README.md
servers:
  - url: http://127.0.0.1:4318/api/v1
security:
  - bearerAuth: []
paths:
  /auth/config:
    get:
      security: []
      summary: 查询注册入口状态
      responses:
        "200": { description: 注册入口配置 }
  /auth/register:
    post:
      security: []
      summary: 创建账号并登录
      responses:
        "200": { description: 新账号、会话令牌与旧数据迁移结果 }
  /auth/login:
    post:
      security: []
      summary: 使用账号密码登录
      responses:
        "200": { description: 当前账号与会话令牌 }
  /auth/session:
    get:
      summary: 验证当前会话
      responses:
        "200": { description: 当前登录账号 }
  /auth/logout:
    post:
      summary: 注销当前会话
      responses:
        "204": { description: 已退出登录 }
  /pairing/sessions:
    post:
      summary: 创建短时手机配对会话
      responses:
        "200": { description: 配对会话、一次性秘密与过期时间 }
  /pairing/sessions/{id}:
    get:
      summary: 查询属于当前账号的配对状态
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200": { description: 当前配对状态和待确认设备 }
  /pairing/sessions/{id}/claim:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    post:
      security: []
      summary: 手机使用一次性秘密申请配对
      responses:
        "200": { description: 已进入待确认状态 }
  /pairing/sessions/{id}/approve:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    post:
      summary: 当前账号确认手机配对请求
      responses:
        "200": { description: 已允许手机兑换设备令牌 }
  /pairing/sessions/{id}/redeem:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    post:
      security: []
      summary: 已确认的手机兑换设备令牌
      responses:
        "200": { description: 只返回一次的设备令牌与设备信息 }
  /devices:
    get:
      summary: 查询当前账号的配对设备
      responses:
        "200": { description: 设备列表 }
  /devices/heartbeat:
    post:
      summary: 上报移动端连接与同步健康心跳
      responses:
        "200": { description: Hub 接收时间与当前移动端健康状态 }
  /devices/health:
    get:
      summary: 查询当前账号的移动端健康状态
      responses:
        "200": { description: 移动端在线、同步、SSE、版本与延迟状态 }
  /devices/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    delete:
      summary: 撤销设备及其访问令牌
      responses:
        "204": { description: 已撤销 }
  /sync/changes:
    get:
      summary: 按游标补拉当前账号的增量变化
      parameters:
        - in: query
          name: after
          schema: { type: integer, minimum: 0 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500 }
      responses:
        "200": { description: 增量变化、下一游标和是否还有更多 }
  /sync/events:
    get:
      summary: 订阅当前账号的 SSE 实时变化通知
      parameters:
        - in: query
          name: after
          schema: { type: integer, minimum: 0 }
        - in: query
          name: client_id
          schema: { type: string }
          description: 移动端安装标识，用于由 Hub 直接确认 SSE 通道状态。
      responses:
        "200":
          description: text/event-stream，先发送 ready，随后发送 change
          content:
            text/event-stream: {}
  /todos:
    get:
      summary: 查询待办
      parameters:
        - in: query
          name: date
          schema: { type: string, format: date }
        - in: query
          name: status
          schema: { type: string, enum: [all, active, completed] }
      responses:
        "200": { description: 待办列表 }
    post:
      summary: 创建待办
      responses:
        "201": { description: 已创建 }
  /todos/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      summary: 获取待办
      responses:
        "200": { description: 待办详情 }
    patch:
      summary: 更新待办
      responses:
        "200": { description: 已更新 }
    delete:
      summary: 删除待办
      responses:
        "204": { description: 已删除 }
  /todos/completed:
    delete:
      summary: 清除当前账号的已完成待办
      responses:
        "200": { description: 已删除数量 }
  /ai/config:
    get:
      summary: 获取公开 AI 配置
      responses:
        "200": { description: AI 配置 }
    put:
      summary: 保存 AI 配置
      responses:
        "200": { description: 已保存 }
  /ai/image-config:
    get:
      summary: 获取公开图像生成 AI 配置
      responses:
        "200": { description: 图像生成 AI 配置 }
    put:
      summary: 保存图像生成 AI 配置
      responses:
        "200": { description: 已保存 }
  /ai/image-generations:
    post:
      summary: 调用配置的图像生成模型
      responses:
        "200": { description: 图像生成 Provider 响应 }
  /ai/chat:
    post:
      summary: 调用配置的 AI Provider
      responses:
        "200": { description: Provider 响应 }
  /profile:
    get:
      summary: 获取用户画像
      responses:
        "200": { description: 用户画像 }
    put:
      summary: 保存用户画像
      responses:
        "200": { description: 已保存 }
    patch:
      summary: 局部更新用户画像
      responses:
        "200": { description: 已更新 }
  /preferences:
    get:
      summary: 查询用户偏好
      responses:
        "200": { description: 偏好列表 }
    put:
      summary: 新增或更新偏好
      responses:
        "200": { description: 已保存 }
    post:
      summary: 新增偏好
      responses:
        "201": { description: 已创建 }
  /preferences/{id}:
    delete:
      summary: 删除偏好
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: 已删除 }
  /memories:
    get:
      summary: 查询或全文搜索记忆
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string, enum: [candidate, active, archived] }
      responses:
        "200": { description: 记忆列表 }
    post:
      summary: 创建记忆或候选记忆
      responses:
        "201": { description: 已创建 }
  /memories/{id}:
    parameters:
      - $ref: "#/components/parameters/Id"
    get:
      summary: 获取单条记忆
      responses:
        "200": { description: 记忆详情 }
    patch:
      summary: 修改记忆
      responses:
        "200": { description: 已更新 }
    delete:
      summary: 永久删除记忆
      responses:
        "204": { description: 已删除 }
  /memories/{id}/confirm:
    parameters:
      - $ref: "#/components/parameters/Id"
    post:
      summary: 确认候选记忆
      responses:
        "200": { description: 已确认 }
  /memories/recall:
    post:
      summary: 根据当前对话场景召回画像、偏好和已确认记忆
      responses:
        "200": { description: 可注入的上下文及可解释引用列表 }
  /memories/extract:
    post:
      summary: 从一轮对话中自动提取候选记忆
      responses:
        "200": { description: 去重后的候选记忆列表 }
  /memories/consolidate:
    post:
      summary: 合并当前账号的重复记忆
      responses:
        "200": { description: 合并结果 }
  /memories/settings:
    get:
      summary: 获取记忆自动确认设置
      responses:
        "200": { description: 当前用户的记忆设置 }
    put:
      summary: 开启或关闭自动确认
      responses:
        "200": { description: 已保存的记忆设置 }
  /xuan-mood/home:
    get:
      summary: 获取小玄心情模块的首页展示缓存
      responses:
        "200": { description: 当前心情状态、展示内容和近期事件 }
  /xuan-mood/events:
    post:
      summary: 投递聊天、手记或共同经历对小玄心情的影响事件
      responses:
        "201": { description: 已记录事件并尝试生成状态 }
  /xuan-mood/refresh:
    post:
      summary: 基于近期事件刷新小玄心情展示
      responses:
        "200": { description: 刷新后的心情快照 }
  /archives/export:
    post:
      summary: 生成当前账号的加密完整存档
      description: 创建一次性下载票据。存档包含当前账号的记录、设置、模型凭据与媒体文件，仅支持完整恢复。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
                  minLength: 8
                  maxLength: 256
                  description: 用于加密存档的密码，不会由 Hub 保存。
      responses:
        "200": { description: 一次性下载路径、文件名、过期时间与存档内容汇总 }
        "400": { description: 存档密码不符合要求 }
        "409": { description: Agent 正在运行、媒体损坏或当前账号已有存档任务 }
  /archives/download/{ticket}:
    parameters:
      - in: path
        name: ticket
        required: true
        schema: { type: string }
        description: 导出接口签发的短时一次性下载票据。
    get:
      security: []
      summary: 使用一次性票据下载完整存档
      description: 票据使用后立即失效；默认在签发五分钟后过期。
      responses:
        "200":
          description: 加密的 AetherX 完整存档
          headers:
            Content-Disposition:
              schema: { type: string }
            Content-Length:
              schema: { type: integer }
          content:
            application/vnd.aetherx.archive:
              schema: { type: string, format: binary }
        "404": { description: 下载票据不存在、已使用或已经过期 }
  /archives/restore:
    post:
      summary: 使用加密存档完整恢复当前账号
      description: 校验存档完整性后替换当前账号全部数据，并在恢复前自动生成备份。恢复完成后客户端必须清空缓存并重新同步。
      parameters:
        - in: header
          name: X-AetherX-Archive-Password
          required: true
          schema: { type: string, format: byte }
          description: 存档密码的 UTF-8 Base64 编码，最长 512 个字符。
      requestBody:
        required: true
        content:
          application/vnd.aetherx.archive:
            schema: { type: string, format: binary }
      responses:
        "200": { description: 一致性摘要、重置游标、恢复内容汇总与恢复前备份文件名 }
        "400": { description: 密码错误、存档格式无效、文件过大或一致性校验失败 }
        "409": { description: Agent 正在运行、数据或媒体文件冲突，或当前账号已有存档任务 }
  /conversations:
    get:
      summary: 获取全部历史会话
      responses:
        "200": { description: 按最近更新时间排序的会话列表 }
    post:
      summary: 创建新会话
      responses:
        "201": { description: 已创建 }
  /conversations/page:
    get:
      summary: 分页获取历史会话
      description: 按最近更新时间倒序返回会话，适合客户端先显示最新会话，再在空闲时逐页加载历史记录。
      parameters:
        - in: query
          name: offset
          schema: { type: integer, minimum: 0, default: 0 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50, default: 12 }
      responses:
        "200": { description: 会话 items、总数 total、当前 offset 和 limit，以及是否还有更多 hasMore }
  /conversations/{id}:
    parameters:
      - $ref: "#/components/parameters/Id"
    get:
      summary: 恢复完整会话及模型上下文
      responses:
        "200": { description: 界面消息流与模型消息流 }
    delete:
      summary: 永久删除会话
      responses:
        "204": { description: 已删除 }
  /conversations/{id}/messages:
    parameters:
      - $ref: "#/components/parameters/Id"
    put:
      summary: 增量写入或更新会话消息
      responses:
        "200": { description: 已保存的消息数量 }
  /agent/chat:
    post:
      summary: 由 Agent Hub 处理一轮聊天、工具调用与会话保存
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                conversationId: { type: string }
                content: { type: string, minLength: 1, maxLength: 30000 }
                runtime:
                  type: object
                  properties:
                    timeZone: { type: string }
                    locale: { type: string }
      responses:
        "200": { description: 已完成，或暂停等待工具授权的服务端消息流 }
        "409": { description: 同一会话已有活跃 Agent 运行 }
  /agent/runs/{id}/approve:
    parameters:
      - $ref: "#/components/parameters/Id"
    post:
      summary: 允许或拒绝当前 Agent 运行中的写工具
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [approved]
              properties:
                approved: { type: boolean }
      responses:
        "200": { description: 运行已继续、完成或等待下一次授权 }
        "404": { description: 运行不存在、已过期或不属于当前账号 }
  /prompt-settings:
    get:
      summary: 获取当前账号的提示词设置
      responses:
        "200": { description: 提示词设置 }
    put:
      summary: 保存提示词设置并记录版本
      responses:
        "200": { description: 已保存 }
  /prompt-settings/versions:
    get:
      summary: 获取提示词历史版本
      responses:
        "200": { description: 版本列表 }
  /prompt-settings/versions/{version}/restore:
    parameters:
      - $ref: "#/components/parameters/Version"
    post:
      summary: 恢复指定提示词版本
      responses:
        "200": { description: 已恢复 }
  /time-awareness/context:
    post:
      summary: 获取适合注入对话的时间上下文
      responses:
        "200": { description: 时间与日程上下文 }
  /assistant/profile:
    get:
      summary: 获取 AI 伙伴画像与成长状态
      responses:
        "200": { description: AI 伙伴画像 }
    patch:
      summary: 局部更新 AI 伙伴画像
      responses:
        "200": { description: 已更新 }
  /assistant/personality-events:
    get:
      summary: 查询人格成长事件
      responses:
        "200": { description: 事件列表 }
    post:
      summary: 创建人格成长事件
      responses:
        "201": { description: 已创建 }
  /assistant/personality-events/{id}/confirm:
    parameters:
      - $ref: "#/components/parameters/Id"
    post:
      summary: 确认人格成长事件
      responses:
        "200": { description: 已确认 }
  /assistant/personality-events/{id}:
    parameters:
      - $ref: "#/components/parameters/Id"
    delete:
      summary: 删除人格成长事件
      responses:
        "204": { description: 已删除 }
  /shared-memories:
    get:
      summary: 查询共同记忆
      responses:
        "200": { description: 共同记忆列表 }
    post:
      summary: 创建共同记忆
      responses:
        "201": { description: 已创建 }
  /shared-memories/{id}/confirm:
    parameters:
      - $ref: "#/components/parameters/Id"
    post:
      summary: 确认共同记忆
      responses:
        "200": { description: 已确认 }
  /shared-memories/{id}:
    parameters:
      - $ref: "#/components/parameters/Id"
    delete:
      summary: 删除共同记忆
      responses:
        "204": { description: 已删除 }
  /assistant/journals:
    get:
      summary: 查询 AI 伙伴手记
      responses:
        "200": { description: 手记列表 }
    put:
      summary: 创建或更新手记
      responses:
        "200": { description: 已保存 }
  /assistant/journals/material:
    get:
      summary: 查询生成手记所需的时间范围材料
      responses:
        "200": { description: 手记材料 }
  /assistant/journals/{type}/{periodKey}:
    parameters:
      - $ref: "#/components/parameters/JournalType"
      - $ref: "#/components/parameters/PeriodKey"
    get:
      summary: 按类型和周期获取手记
      responses:
        "200": { description: 手记详情 }
  /assistant/journals/{id}:
    parameters:
      - $ref: "#/components/parameters/Id"
    delete:
      summary: 删除手记
      responses:
        "204": { description: 已删除 }
  /assistant/gallery/summary:
    get:
      summary: 获取 AI 伙伴画廊汇总
      responses:
        "200": { description: 画廊汇总 }
  /assistant/gallery/page:
    get:
      summary: 获取 AI 伙伴画廊分页
      responses:
        "200": { description: 画廊分页 }
  /assistant/gallery:
    get:
      summary: 查询 AI 伙伴画廊
      responses:
        "200": { description: 画面列表 }
  /media/{id}:
    parameters:
      - $ref: "#/components/parameters/Id"
    get:
      summary: 读取当前账号的图片资源
      description: 返回原图或预览图。供原生图片组件直接加载时，可使用查询参数传递短期访问令牌。
      security:
        - bearerAuth: []
        - mediaAccessToken: []
      parameters:
        - in: query
          name: variant
          schema: { type: string, enum: [original, preview], default: original }
          description: 选择原图或经过压缩的预览图。
        - in: query
          name: access_token
          schema: { type: string }
          description: 无法设置 Authorization 请求头的图片组件可使用此令牌。
      responses:
        "200":
          description: 图片二进制内容
          headers:
            ETag:
              schema: { type: string }
            Cache-Control:
              schema: { type: string }
          content:
            image/jpeg:
              schema: { type: string, format: binary }
            image/png:
              schema: { type: string, format: binary }
            image/webp:
              schema: { type: string, format: binary }
        "304": { description: 客户端缓存仍然有效 }
  /album/moments:
    get:
      summary: 查询纪念册时刻
      responses:
        "200": { description: 时刻列表 }
    post:
      summary: 创建纪念册时刻
      responses:
        "201": { description: 已创建 }
  /album/moments/{id}:
    parameters:
      - $ref: "#/components/parameters/Id"
    get:
      summary: 获取纪念册时刻详情
      responses:
        "200": { description: 时刻详情 }
    patch:
      summary: 更新纪念册时刻
      responses:
        "200": { description: 已更新 }
    delete:
      summary: 删除纪念册时刻
      responses:
        "204": { description: 已删除 }
  /album/moments/{id}/hide:
    parameters:
      - $ref: "#/components/parameters/Id"
    post:
      summary: 隐藏纪念册时刻
      responses:
        "200": { description: 已隐藏 }
  /album/moments/{id}/sources:
    parameters:
      - $ref: "#/components/parameters/Id"
    post:
      summary: 为纪念册时刻添加来源
      responses:
        "201": { description: 已添加 }
  /album/source-candidates:
    get:
      summary: 查询可加入纪念册的来源候选
      responses:
        "200": { description: 来源候选列表 }
  /dreams:
    get:
      summary: 查询梦境
      responses:
        "200": { description: 梦境列表 }
    post:
      summary: 创建梦境
      responses:
        "201": { description: 已创建 }
  /dreams/material:
    get:
      summary: 查询生成梦境所需材料
      responses:
        "200": { description: 梦境材料 }
  /dreams/by-date/{dreamDate}:
    parameters:
      - $ref: "#/components/parameters/DreamDate"
    get:
      summary: 按日期获取梦境
      responses:
        "200": { description: 梦境详情 }
  /dreams/{id}:
    parameters:
      - $ref: "#/components/parameters/Id"
    get:
      summary: 获取梦境详情
      responses:
        "200": { description: 梦境详情 }
    patch:
      summary: 更新梦境
      responses:
        "200": { description: 已更新 }
    delete:
      summary: 删除梦境
      responses:
        "204": { description: 已删除 }
  /dreams/{id}/sources:
    parameters:
      - $ref: "#/components/parameters/Id"
    post:
      summary: 为梦境添加来源
      responses:
        "201": { description: 已添加 }
components:
  parameters:
    Id:
      in: path
      name: id
      required: true
      schema: { type: string }
    Version:
      in: path
      name: version
      required: true
      schema: { type: integer, minimum: 1 }
    JournalType:
      in: path
      name: type
      required: true
      schema: { type: string }
    PeriodKey:
      in: path
      name: periodKey
      required: true
      schema: { type: string }
    DreamDate:
      in: path
      name: dreamDate
      required: true
      schema: { type: string, format: date }
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
    mediaAccessToken:
      type: apiKey
      in: query
      name: access_token
