openapi: 3.1.0
info:
  title: XuanAI API
  version: 1.0.0
servers:
  - url: http://127.0.0.1:4318/api/v1
paths:
  /todos:
    get:
      summary: 查询待办
      parameters:
        - in: query
          name: date
          schema: { type: string, format: date }
        - in: query
          name: status
          schema: { type: string, enum: [all, active, completed] }
      responses:
        "200": { description: 待办列表 }
    post:
      summary: 创建待办
      responses:
        "201": { description: 已创建 }
  /todos/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      summary: 获取待办
      responses:
        "200": { description: 待办详情 }
    patch:
      summary: 更新待办
      responses:
        "200": { description: 已更新 }
    delete:
      summary: 删除待办
      responses:
        "204": { description: 已删除 }
  /ai/config:
    get:
      summary: 获取公开 AI 配置
      responses:
        "200": { description: AI 配置 }
    put:
      summary: 保存 AI 配置
      responses:
        "200": { description: 已保存 }
  /ai/chat:
    post:
      summary: 调用配置的 AI Provider
      responses:
        "200": { description: Provider 响应 }
  /profile:
    get:
      summary: 获取用户画像
      responses:
        "200": { description: 用户画像 }
    put:
      summary: 保存用户画像
      responses:
        "200": { description: 已保存 }
  /preferences:
    get:
      summary: 查询用户偏好
      responses:
        "200": { description: 偏好列表 }
    put:
      summary: 新增或更新偏好
      responses:
        "200": { description: 已保存 }
  /preferences/{id}:
    delete:
      summary: 删除偏好
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: 已删除 }
  /memories:
    get:
      summary: 查询或全文搜索记忆
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string, enum: [candidate, active, archived] }
      responses:
        "200": { description: 记忆列表 }
    post:
      summary: 创建记忆或候选记忆
      responses:
        "201": { description: 已创建 }
  /memories/{id}:
    patch:
      summary: 修改记忆
      responses:
        "200": { description: 已更新 }
    delete:
      summary: 永久删除记忆
      responses:
        "204": { description: 已删除 }
  /memories/{id}/confirm:
    post:
      summary: 确认候选记忆
      responses:
        "200": { description: 已确认 }
  /memories/recall:
    post:
      summary: 根据当前对话场景召回画像、偏好和已确认记忆
      responses:
        "200": { description: 可注入的上下文及可解释引用列表 }
  /memories/extract:
    post:
      summary: 从一轮对话中自动提取候选记忆
      responses:
        "200": { description: 去重后的候选记忆列表 }
  /memories/settings:
    get:
      summary: 获取记忆自动确认设置
      responses:
        "200": { description: 当前用户的记忆设置 }
    put:
      summary: 开启或关闭自动确认
      responses:
        "200": { description: 已保存的记忆设置 }
  /conversations:
    get:
      summary: 获取全部历史会话
      responses:
        "200": { description: 按最近更新时间排序的会话列表 }
    post:
      summary: 创建新会话
      responses:
        "201": { description: 已创建 }
  /conversations/{id}:
    get:
      summary: 恢复完整会话及模型上下文
      responses:
        "200": { description: 界面消息流与模型消息流 }
    delete:
      summary: 永久删除会话
      responses:
        "204": { description: 已删除 }
  /conversations/{id}/messages:
    put:
      summary: 增量写入或更新会话消息
      responses:
        "200": { description: 已保存的消息数量 }
