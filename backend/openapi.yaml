openapi: 3.1.0
info:
  title: AetherX API
  version: 1.0.0
servers:
  - url: http://127.0.0.1:4318/api/v1
security:
  - bearerAuth: []
paths:
  /auth/config:
    get:
      security: []
      summary: 查询注册入口状态
      responses:
        "200": { description: 注册入口配置 }
  /auth/register:
    post:
      security: []
      summary: 创建账号并登录
      responses:
        "200": { description: 新账号、会话令牌与旧数据迁移结果 }
  /auth/login:
    post:
      security: []
      summary: 使用账号密码登录
      responses:
        "200": { description: 当前账号与会话令牌 }
  /auth/session:
    get:
      summary: 验证当前会话
      responses:
        "200": { description: 当前登录账号 }
  /auth/logout:
    post:
      summary: 注销当前会话
      responses:
        "204": { description: 已退出登录 }
  /todos:
    get:
      summary: 查询待办
      parameters:
        - in: query
          name: date
          schema: { type: string, format: date }
        - in: query
          name: status
          schema: { type: string, enum: [all, active, completed] }
      responses:
        "200": { description: 待办列表 }
    post:
      summary: 创建待办
      responses:
        "201": { description: 已创建 }
  /todos/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      summary: 获取待办
      responses:
        "200": { description: 待办详情 }
    patch:
      summary: 更新待办
      responses:
        "200": { description: 已更新 }
    delete:
      summary: 删除待办
      responses:
        "204": { description: 已删除 }
  /ai/config:
    get:
      summary: 获取公开 AI 配置
      responses:
        "200": { description: AI 配置 }
    put:
      summary: 保存 AI 配置
      responses:
        "200": { description: 已保存 }
  /ai/image-config:
    get:
      summary: 获取公开图像生成 AI 配置
      responses:
        "200": { description: 图像生成 AI 配置 }
    put:
      summary: 保存图像生成 AI 配置
      responses:
        "200": { description: 已保存 }
  /ai/image-generations:
    post:
      summary: 调用配置的图像生成模型
      responses:
        "200": { description: 图像生成 Provider 响应 }
  /ai/chat:
    post:
      summary: 调用配置的 AI Provider
      responses:
        "200": { description: Provider 响应 }
  /profile:
    get:
      summary: 获取用户画像
      responses:
        "200": { description: 用户画像 }
    put:
      summary: 保存用户画像
      responses:
        "200": { description: 已保存 }
  /preferences:
    get:
      summary: 查询用户偏好
      responses:
        "200": { description: 偏好列表 }
    put:
      summary: 新增或更新偏好
      responses:
        "200": { description: 已保存 }
  /preferences/{id}:
    delete:
      summary: 删除偏好
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: 已删除 }
  /memories:
    get:
      summary: 查询或全文搜索记忆
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string, enum: [candidate, active, archived] }
      responses:
        "200": { description: 记忆列表 }
    post:
      summary: 创建记忆或候选记忆
      responses:
        "201": { description: 已创建 }
  /memories/{id}:
    patch:
      summary: 修改记忆
      responses:
        "200": { description: 已更新 }
    delete:
      summary: 永久删除记忆
      responses:
        "204": { description: 已删除 }
  /memories/{id}/confirm:
    post:
      summary: 确认候选记忆
      responses:
        "200": { description: 已确认 }
  /memories/recall:
    post:
      summary: 根据当前对话场景召回画像、偏好和已确认记忆
      responses:
        "200": { description: 可注入的上下文及可解释引用列表 }
  /memories/extract:
    post:
      summary: 从一轮对话中自动提取候选记忆
      responses:
        "200": { description: 去重后的候选记忆列表 }
  /memories/settings:
    get:
      summary: 获取记忆自动确认设置
      responses:
        "200": { description: 当前用户的记忆设置 }
    put:
      summary: 开启或关闭自动确认
      responses:
        "200": { description: 已保存的记忆设置 }
  /xuan-mood/home:
    get:
      summary: 获取小玄心情模块的首页展示缓存
      responses:
        "200": { description: 当前心情状态、展示内容和近期事件 }
  /xuan-mood/events:
    post:
      summary: 投递聊天、手记或共同经历对小玄心情的影响事件
      responses:
        "201": { description: 已记录事件并尝试生成状态 }
  /xuan-mood/refresh:
    post:
      summary: 基于近期事件刷新小玄心情展示
      responses:
        "200": { description: 刷新后的心情快照 }
  /conversations:
    get:
      summary: 获取全部历史会话
      responses:
        "200": { description: 按最近更新时间排序的会话列表 }
    post:
      summary: 创建新会话
      responses:
        "201": { description: 已创建 }
  /conversations/{id}:
    get:
      summary: 恢复完整会话及模型上下文
      responses:
        "200": { description: 界面消息流与模型消息流 }
    delete:
      summary: 永久删除会话
      responses:
        "204": { description: 已删除 }
  /conversations/{id}/messages:
    put:
      summary: 增量写入或更新会话消息
      responses:
        "200": { description: 已保存的消息数量 }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
